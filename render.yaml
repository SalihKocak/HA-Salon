# Render Blueprint: PostgreSQL + API (Docker / .NET 9) + static Vite frontend.
# Render native "dotnet" runtime is not offered; API must use Docker.
# Dashboard: New + → Blueprint → connect repo → apply this file.

databases:
  - name: gym-postgres
    plan: free
    region: oregon
    databaseName: gymmanagement
    user: gym

services:
  - type: web
    name: gym-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./backend/GymManagement.API/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: gym-postgres
          property: connectionString
      - key: Jwt__SecretKey
        generateValue: true
      - key: Jwt__Issuer
        value: GymManagement
      - key: Jwt__Audience
        value: GymManagementApp
      - key: Jwt__AccessTokenExpiryMinutes
        value: "30"
      - key: Jwt__RefreshTokenExpiryDays
        value: "7"
      - key: AdminSeed__Email
        value: admin@gym.demo
      - key: AdminSeed__Password
        generateValue: true
      - key: AdminSeed__FirstName
        value: Gym
      - key: AdminSeed__LastName
        value: Admin
      - key: MemberSeed__Enabled
        value: "false"
      # Demo: allow any https://*.onrender.com without listing AllowedOrigins.
      # For strict CORS, set to false and set AllowedOrigins in the dashboard.
      - key: RenderDemo__RelaxCors
        value: "true"

  - type: web
    name: gym-frontend
    runtime: static
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: gym-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
