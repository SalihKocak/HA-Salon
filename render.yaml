databases:
  - name: gym-postgres
    plan: free
    databaseName: gymmanagement
    user: gym

services:
  - type: web
    name: gym-api
    runtime: dotnet
    plan: free
    rootDir: backend/GymManagement.API
    buildCommand: dotnet restore && dotnet publish -c Release -o out
    startCommand: dotnet out/GymManagement.API.dll
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: gym-postgres
          property: connectionString
      - key: Jwt__SecretKey
        generateValue: true
      - key: Jwt__Issuer
        value: GymManagement
      - key: Jwt__Audience
        value: GymManagementApp
      - key: Jwt__AccessTokenExpiryMinutes
        value: "30"
      - key: Jwt__RefreshTokenExpiryDays
        value: "7"
      - key: AdminSeed__Email
        value: admin@gym.demo
      - key: AdminSeed__Password
        generateValue: true
      - key: AdminSeed__FirstName
        value: Gym
      - key: AdminSeed__LastName
        value: Admin
      - key: MemberSeed__Enabled
        value: "false"
      - key: AllowedOrigins
        sync: false

  - type: web
    name: gym-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
