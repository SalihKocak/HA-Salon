services:
  postgres:
    image: postgres:16-alpine
    container_name: gym-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gym}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local}
      POSTGRES_DB: ${POSTGRES_DB:-gymmanagement}
    volumes:
      - gym_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gym} -d ${POSTGRES_DB:-gymmanagement}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gym_pg_data:
